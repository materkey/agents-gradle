version: '3'

vars:
  GRADLE_DOCS_URL: https://docs.gradle.org/current/userguide/userguide.html
  DB_PATH: cmd/gradle-rag/db/gradle.db
  BINARY_PATH: gradle-docs/skills/gradle/references/gradle-rag
  DIST_DIR: dist

tasks:
  build-db:
    desc: Crawl current Gradle docs and build the embedded SQLite FTS5 index
    cmds:
      - go run ./cmd/crawler --start "{{.GRADLE_DOCS_URL}}" --db "{{.DB_PATH}}"

  smoke-db:
    desc: Build a small capped index for fast local validation
    cmds:
      - go run ./cmd/crawler --start "{{.GRADLE_DOCS_URL}}" --db "{{.DB_PATH}}" --max-pages 80 --workers 4

  build:
    desc: Build gradle-rag binary for the current platform
    deps: [build-db]
    cmds:
      - mkdir -p gradle-docs/skills/gradle/references
      - |
        VERSION="v0.$(date +%Y.%m%d)"
        go build -ldflags "-s -w -X main.version=$VERSION" -o "{{.BINARY_PATH}}" ./cmd/gradle-rag

  build-fast:
    desc: Build gradle-rag using the current checked-in/generated database
    cmds:
      - mkdir -p gradle-docs/skills/gradle/references
      - go build -o "{{.BINARY_PATH}}" ./cmd/gradle-rag

  test:
    desc: Run Go tests
    cmds:
      - go test ./...

  install-local:
    desc: Install direct Claude and Codex skills as symlinks to the plugin skill
    deps: [build-fast]
    cmds:
      - rm -rf "$HOME/.claude/skills/gradle" "$HOME/.codex/skills/gradle"
      - mkdir -p "$HOME/.claude/skills" "$HOME/.codex/skills"
      - ln -s "$(pwd)/gradle-docs/skills/gradle" "$HOME/.claude/skills/gradle"
      - ln -s "$(pwd)/gradle-docs/skills/gradle" "$HOME/.codex/skills/gradle"

  install-plugins:
    desc: Install the versionless local plugin into Claude and Codex
    deps: [build-fast]
    cmds:
      - codex plugin marketplace add "$(pwd)"
      - python3 "$HOME/.codex/plugins/cache/agent-thingz/plugin-management/0.1.0/scripts/pluginctl.py" install agents-gradle gradle-docs --force
      - claude plugin marketplace add "$(pwd)"
      - claude plugin install gradle-docs@agents-gradle --scope user

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf "{{.DIST_DIR}}" gradle-rag
      - rm -f "{{.DB_PATH}}"
      - rm -f "{{.BINARY_PATH}}"
