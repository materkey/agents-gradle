version: '3'

vars:
  GRADLE_DOCS_URL: https://docs.gradle.org/current/userguide/userguide.html
  DB_PATH: cmd/gradle-rag/db/gradle.db
  BINARY_PATH: gradle-rag/skills/gradle-rag/references/gradle-rag
  DIST_DIR: dist

tasks:
  build-db:
    desc: Crawl current Gradle docs and build the embedded SQLite FTS5 index
    cmds:
      - go run ./cmd/crawler --start "{{.GRADLE_DOCS_URL}}" --db "{{.DB_PATH}}"

  smoke-db:
    desc: Build a small capped index for fast local validation
    cmds:
      - go run ./cmd/crawler --start "{{.GRADLE_DOCS_URL}}" --db "{{.DB_PATH}}" --max-pages 80 --workers 4

  build:
    desc: Build gradle-rag binary for the current platform
    deps: [build-db]
    cmds:
      - mkdir -p gradle-rag/skills/gradle-rag/references
      - |
        VERSION="v0.$(date +%Y.%m%d)"
        go build -ldflags "-s -w -X main.version=$VERSION" -o "{{.BINARY_PATH}}" ./cmd/gradle-rag
      - chmod +x gradle-rag/skills/gradle-rag/bin/gradle-rag

  build-fast:
    desc: Build gradle-rag using the current checked-in/generated database
    cmds:
      - mkdir -p gradle-rag/skills/gradle-rag/references
      - go build -o "{{.BINARY_PATH}}" ./cmd/gradle-rag
      - chmod +x gradle-rag/skills/gradle-rag/bin/gradle-rag

  test:
    desc: Run Go tests
    cmds:
      - go test ./...

  install-local:
    desc: Install the versionless local plugins into Claude and Codex
    deps: [install-plugins]

  install-plugins:
    desc: Install the versionless local plugins into Claude and Codex
    deps: [build-fast]
    cmds:
      - |
        for path in "$HOME/.claude/skills/gradle" "$HOME/.codex/skills/gradle" "$HOME/.claude/skills/gradle-rag" "$HOME/.codex/skills/gradle-rag"; do
          if [ -L "$path" ]; then
            rm "$path"
          elif [ -e "$path" ]; then
            echo "Refusing to remove non-symlink legacy skill at $path" >&2
            exit 1
          fi
        done
      - |
        config="$HOME/.codex/config.toml"
        if [ -f "$config" ]; then
          tmp="${config}.tmp"
          awk '
            /^\[plugins\."(gradle-docs|gradle)@agents-gradle"\]/ { skip = 1; next }
            skip && /^\[/ { skip = 0 }
            !skip { print }
          ' "$config" > "$tmp"
          mv "$tmp" "$config"
        fi
      - |
        PY="$(command -v python3.13 || command -v python3.12 || command -v python3.11 || command -v python3 || true)"
        if [ -z "$PY" ] || ! "$PY" -c 'import sys; sys.exit(0 if sys.version_info >= (3, 9) else 1)'; then
          echo "Need Python 3.9+ (found: ${PY:-none})" >&2; exit 1
        fi
        "$PY" "$(pwd)/scripts/install-codex-plugins.py" --root "$(pwd)" gradle-rag gradle-grill agp-sources gradle-sources kotlin-sources ksp-sources
      - claude plugin marketplace add "$(pwd)"
      - claude plugin uninstall gradle-docs@agents-gradle --scope user --keep-data || true
      - claude plugin uninstall gradle@agents-gradle --scope user --keep-data || true
      - |
        for plugin in gradle-rag gradle-grill agp-sources gradle-sources kotlin-sources ksp-sources; do
          claude plugin uninstall "${plugin}@agents-gradle" --scope user --keep-data || true
          claude plugin install "${plugin}@agents-gradle" --scope user
        done
      - scripts/install-gradle-rag-bin.sh

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf "{{.DIST_DIR}}"
      - rm -f "{{.DB_PATH}}"
      - rm -f "{{.BINARY_PATH}}"
