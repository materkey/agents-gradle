version: '3'

vars:
  GRADLE_DOCS_URL: https://docs.gradle.org/current/userguide/userguide.html
  DB_PATH: cmd/gradle-rag/db/gradle.db
  BINARY_PATH: gradle-rag/skills/gradle-rag/references/gradle-rag
  DIST_DIR: dist

tasks:
  build-db:
    desc: Crawl current Gradle docs and build the embedded SQLite FTS5 index
    cmds:
      - go run ./cmd/crawler --start "{{.GRADLE_DOCS_URL}}" --db "{{.DB_PATH}}"

  smoke-db:
    desc: Build a small capped index for fast local validation
    cmds:
      - go run ./cmd/crawler --start "{{.GRADLE_DOCS_URL}}" --db "{{.DB_PATH}}" --max-pages 80 --workers 4

  build:
    desc: Build gradle-rag binary for the current platform
    deps: [build-db]
    cmds:
      - mkdir -p gradle-rag/skills/gradle-rag/references
      - |
        VERSION="v0.$(date +%Y.%m%d)"
        go build -ldflags "-s -w -X main.version=$VERSION" -o "{{.BINARY_PATH}}" ./cmd/gradle-rag

  build-fast:
    desc: Build gradle-rag using the current checked-in/generated database
    cmds:
      - mkdir -p gradle-rag/skills/gradle-rag/references
      - go build -o "{{.BINARY_PATH}}" ./cmd/gradle-rag

  test:
    desc: Run Go tests
    cmds:
      - go test ./...

  install-local:
    desc: Install the versionless local plugin into Claude and Codex
    deps: [install-plugins]

  install-plugins:
    desc: Install the versionless local plugin into Claude and Codex
    deps: [build-fast]
    cmds:
      - |
        for path in "$HOME/.claude/skills/gradle" "$HOME/.codex/skills/gradle" "$HOME/.claude/skills/gradle-rag" "$HOME/.codex/skills/gradle-rag"; do
          if [ -L "$path" ]; then
            rm "$path"
          elif [ -e "$path" ]; then
            echo "Refusing to remove non-symlink legacy skill at $path" >&2
            exit 1
          fi
        done
      - |
        config="$HOME/.codex/config.toml"
        if [ -f "$config" ]; then
          tmp="${config}.tmp"
          awk '
            /^\[plugins\."(gradle-docs|gradle)@agents-gradle"\]/ { skip = 1; next }
            skip && /^\[/ { skip = 0 }
            !skip { print }
          ' "$config" > "$tmp"
          mv "$tmp" "$config"
        fi
      - codex plugin marketplace add "$(pwd)"
      - |
        # Pick the newest available Python and ensure `tomllib` works on 3.9/3.10
        # via the shim that aliases `tomli`.
        PY=""
        for cmd in python3.13 python3.12 python3.11 python3; do
          if command -v "$cmd" >/dev/null 2>&1 && "$cmd" -c 'import sys; sys.exit(0 if sys.version_info >= (3, 9) else 1)' 2>/dev/null; then
            PY="$cmd"; break
          fi
        done
        if [ -z "$PY" ]; then echo "Need Python 3.9+"; exit 1; fi
        if ! "$PY" -c 'import sys; sys.exit(0 if sys.version_info >= (3, 11) else 1)' 2>/dev/null; then
          "$PY" -c 'import tomli' 2>/dev/null || "$PY" -m pip install --user --quiet tomli
        fi
        "$PY" "$(pwd)/scripts/pluginctl-shim.py" install agents-gradle gradle-rag --force
        "$PY" "$(pwd)/scripts/pluginctl-shim.py" install agents-gradle gradle-grill --force
      - claude plugin marketplace add "$(pwd)"
      - claude plugin uninstall gradle-docs@agents-gradle --scope user --keep-data || true
      - claude plugin uninstall gradle@agents-gradle --scope user --keep-data || true
      - claude plugin install gradle-rag@agents-gradle --scope user
      - claude plugin install gradle-grill@agents-gradle --scope user

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf "{{.DIST_DIR}}"
      - rm -f "{{.DB_PATH}}"
      - rm -f "{{.BINARY_PATH}}"
